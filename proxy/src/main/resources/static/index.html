<!DOCTYPE html>
<html>
<body>
  <h1>Proxy Server</h1>
  List: <input type="text" id="list" value="10,20,13,40,60"><br><br>
  Value: <input type="text" id="val" value="13"><br><br>
  <button onclick="callLinear()">Linear Search</button>
  <button onclick="callBinary()">Binary Search</button>
  <div id="result" style="margin-top: 20px;"></div>
  <script>
    function callLinear() {
      var l = document.getElementById("list").value;
      var v = document.getElementById("val").value;
      var x = new XMLHttpRequest();
      x.onload = function() {
        document.getElementById("result").innerHTML = this.responseText;
      };
      x.open("GET", "/proxy/linearsearch?list=" + l + "&value=" + v);
      x.send();
    }

    function callBinary() {
      var l = document.getElementById("list").value;
      var v = document.getElementById("val").value;
      var x = new XMLHttpRequest();
      x.onload = function() {
        document.getElementById("result").innerHTML = this.responseText;
      };
      x.open("GET", "/proxy/binarysearch?list=" + l + "&value=" + v);
      x.send();
    }
  </script>
</body>
</html>
